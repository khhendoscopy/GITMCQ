<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🩺 Gastrology Exam</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 { color: #333; text-align: center; margin-bottom: 10px; }
        h2 { color: #667eea; margin-bottom: 20px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }

        /* Name Screen */
        #nameScreen { text-align: center; }
        #nameScreen input {
            width: 100%;
            max-width: 400px;
            padding: 15px 20px;
            font-size: 18px;
            border: 2px solid #ddd;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
        }
        #nameScreen input:focus {
            outline: none;
            border-color: #667eea;
        }

        /* Quiz Screen */
        #quizScreen { display: none; }
        .progress-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            margin-bottom: 25px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 4px;
            transition: width 0.3s ease;
        }
        .question-number {
            color: #667eea;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .question-text {
            font-size: 20px;
            color: #333;
            margin-bottom: 25px;
            line-height: 1.5;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .option {
            padding: 18px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 16px;
            background: #fafafa;
        }
        .option:hover {
            border-color: #667eea;
            background: #f0f0ff;
        }
        .option.selected {
            border-color: #667eea;
            background: #667eea;
            color: white;
        }
        .option.correct {
            border-color: #4caf50;
            background: #e8f5e9;
        }
        .option.wrong {
            border-color: #f44336;
            background: #ffebee;
        }

        /* Navigation */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 30px;
            gap: 15px;
        }
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: 600;
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(102,126,234,0.4); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-secondary {
            background: #f0f0f0;
            color: #666;
        }
        .btn-secondary:hover { background: #e0e0e0; }

        /* Results Screen */
        #resultsScreen { display: none; text-align: center; }
        .score-circle {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            color: white;
            font-size: 48px;
            font-weight: bold;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin: 30px 0;
        }
        .stat-box {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 12px;
        }
        .stat-number { font-size: 32px; font-weight: bold; color: #667eea; }
        .stat-label { color: #666; margin-top: 5px; }

        /* Review Section */
        .review-section { margin-top: 30px; text-align: left; }
        .review-item {
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            border-left: 4px solid;
        }
        .review-item.correct { background: #e8f5e9; border-color: #4caf50; }
        .review-item.wrong { background: #ffebee; border-color: #f44336; }
        .review-item.skipped { background: #fff3e0; border-color: #ff9800; }

        /* Analytics Table */
        .analytics { margin-top: 30px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th, td { padding: 12px; text-align: center; border-bottom: 1px solid #eee; }
        th { background: #f8f9fa; color: #667eea; font-weight: 600; }
        tr:hover { background: #f8f9fa; }

        /* Reset Button */
        .reset-btn {
            margin-top: 30px;
            background: #ff5722;
            color: white;
        }
        .reset-btn:hover { background: #e64a19; }

        /* Hidden */
        .hidden { display: none !important; }

        /* Responsive */
        @media (max-width: 600px) {
            .container { padding: 20px; border-radius: 15px; }
            .question-text { font-size: 18px; }
            .stats { grid-template-columns: 1fr; }
            .btn { padding: 12px 20px; font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="container">

    <!-- ==================== NAME SCREEN ==================== -->
    <div id="nameScreen">
        <h1>🩺 Gastrology Part 1</h1>
        <p class="subtitle">Welcome! Enter your name to begin the 30-question exam.<br>You'll see your score and explanations at the end.</p>
        <input type="text" id="nameInput" placeholder="Enter your full name" autocomplete="name">
        <br>
        <button class="btn btn-primary" onclick="startQuiz()" id="startBtn">Start Exam</button>
    </div>

    <!-- ==================== QUIZ SCREEN ==================== -->
    <div id="quizScreen">
        <div class="progress-bar">
            <div class="progress-fill" id="progressBar" style="width: 0%"></div>
        </div>
        <div class="question-number" id="questionNumber">Question 1 of 30</div>
        <div class="question-text" id="questionText"></div>
        <div class="options" id="optionsContainer"></div>
        
        <div class="nav-buttons">
            <button class="btn btn-secondary" onclick="prevQuestion()" id="prevBtn">← Previous</button>
            <button class="btn btn-primary" onclick="nextQuestion()" id="nextBtn">Next →</button>
        </div>
    </div>

    <!-- ==================== RESULTS SCREEN ==================== -->
    <div id="resultsScreen">
        <h1>🎉 Exam Complete!</h1>
        <h2 id="resultGreeting">Great job!</h2>
        
        <div class="score-circle" id="scoreCircle">0</div>
        
        <div class="stats">
            <div class="stat-box">
                <div class="stat-number" id="statCorrect">0</div>
                <div class="stat-label">Correct</div>
            </div>
            <div class="stat-box">
                <div class="stat-number" id="statWrong">0</div>
                <div class="stat-label">Wrong</div>
